name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build

  build-electron:
    name: Build ${{ matrix.name }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            args: --mac dmg --arm64
          - name: macOS Intel
            platform: macos-15-intel
            args: --mac dmg --x64
          - name: Linux x64
            platform: ubuntu-22.04
            args: --linux AppImage --x64
          - name: Windows x64
            platform: windows-latest
            args: --win nsis --x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libfuse2 \
            python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron installer
        run: npm run electron:ship -- ${{ matrix.args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md <<'EOF'
          Electron 桌面安装包。

          下载对应平台的安装包后运行：
          - macOS: .dmg
          - Windows: NSIS .exe
          - Linux: .AppImage
          EOF

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist-release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist-release/* \
              --title "Mermaid Canvas Editor $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
